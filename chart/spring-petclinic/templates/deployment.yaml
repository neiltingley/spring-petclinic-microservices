{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "spring-petclinic.serviceLabels" (dict "root" $ "name" $serviceName) | nindent 4 }}
spec:
  replicas: {{ default $.Values.serviceDefaults.replicaCount $service.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "spring-petclinic.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $serviceName }}
  template:
    metadata:
      labels:
        {{- include "spring-petclinic.serviceLabels" (dict "root" $ "name" $serviceName) | nindent 8 }}
      {{- with $.Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ $serviceName }}
        image: {{ include "spring-petclinic.image" (dict "root" $ "service" $service) }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ $service.port }}
          protocol: TCP
        {{- $resources := default $.Values.serviceDefaults.resources $service.resources }}
        resources:
          {{- toYaml $resources | nindent 10 }}
        {{- $probes := default $.Values.serviceDefaults.probes $service.probes }}
        {{- if $probes.enabled }}
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: {{ $probes.initialDelaySeconds }}
          periodSeconds: {{ $probes.periodSeconds }}
          timeoutSeconds: {{ $probes.timeoutSeconds }}
          failureThreshold: {{ $probes.failureThreshold }}
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: {{ $probes.initialDelaySeconds }}
          periodSeconds: {{ $probes.periodSeconds }}
          timeoutSeconds: {{ $probes.timeoutSeconds }}
          failureThreshold: {{ $probes.failureThreshold }}
        {{- end }}
        {{- if or $.Values.global.env $service.env }}
        env:
        {{- range $key, $value := $.Values.global.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- range $key, $value := $service.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
{{- end }}
{{- end }}
