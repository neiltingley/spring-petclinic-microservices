global:
  imageRegistry: docker.io
  imageNamespace: springcommunity
  imageTag: latest
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  podAnnotations: {}
  env:
    SPRING_PROFILES_ACTIVE: docker

serviceDefaults:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  probes:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: petclinic.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  serviceName: api-gateway
  servicePort: 8080

services:
  config-server:
    enabled: true
    repository: spring-petclinic-config-server
    port: 8888
    service:
      type: ClusterIP

  discovery-server:
    enabled: true
    repository: spring-petclinic-discovery-server
    port: 8761
    service:
      type: ClusterIP

  customers-service:
    enabled: true
    repository: spring-petclinic-customers-service
    port: 8081
    service:
      type: ClusterIP

  visits-service:
    enabled: true
    repository: spring-petclinic-visits-service
    port: 8082
    service:
      type: ClusterIP

  vets-service:
    enabled: true
    repository: spring-petclinic-vets-service
    port: 8083
    service:
      type: ClusterIP

  genai-service:
    enabled: true
    repository: spring-petclinic-genai-service
    port: 8084
    env:
      OPENAI_API_KEY: ""
      AZURE_OPENAI_KEY: ""
      AZURE_OPENAI_ENDPOINT: ""
    service:
      type: ClusterIP

  api-gateway:
    enabled: true
    repository: spring-petclinic-api-gateway
    port: 8080
    service:
      type: ClusterIP

  admin-server:
    enabled: true
    repository: spring-petclinic-admin-server
    port: 9090
    service:
      type: ClusterIP

  tracing-server:
    enabled: true
    image: docker.io/openzipkin/zipkin:latest
    port: 9411
    service:
      type: ClusterIP

  grafana-server:
    enabled: false
    image: docker.io/grafana/grafana:latest
    port: 3000
    service:
      type: ClusterIP

  prometheus-server:
    enabled: false
    image: docker.io/prom/prometheus:latest
    port: 9090
    service:
      type: ClusterIP
